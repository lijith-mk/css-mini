<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="checkout-container">

<div class="checkout-left">

<h3 style="color:#888;">Checkout</h3>

<label>Email</label>
<input type="email">

<h2 style="margin-top:20px;">Payment</h2>

<div class="methods">
<div class="method active">Card</div>
<div class="method">Crypto</div>
<div class="method">Bank</div>
</div>

<label>Card Number</label>
<input>

<div class="row">
<input placeholder="MM/YY">
<input placeholder="CVC">
</div>

<div class="row">
<select><option>India</option></select>
<input placeholder="ZIP">
</div>

</div>

<div class="checkout-right">

<h2>Order Summary</h2>

<input placeholder="Coupon">
<button>Apply</button>

<div class="summary">
<p>Sub Total <span>₹4,700</span></p>
<p>Taxes <span>₹199</span></p>
<p>Discount <span>₹0</span></p>
<h3>Total <span>₹4,999</span></h3>
</div>

<button class="pay-btn">Pay Now ₹4,999</button>

</div>

</section>

</body>
</html>
