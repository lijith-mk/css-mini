<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<div class="logo">Thala <span>7.</span></div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="#">About</a>
<a href="#">Brands</a>
<a href="#">Contact</a>
</div>
<div class="nav-icons">
<input class="search" placeholder="Search">
🛒
<img src="https://i.pravatar.cc/40" class="profile">
</div>
</header>

<section class="cart-container">

<div class="cart-left">
<h1>Shopping Cart</h1>

<table>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
</tr>

<tr>
<td>Shoe</td>
<td>1</td>
<td>₹4,999</td>
</tr>
</table>

<p style="margin-top:20px;">← Continue Shopping</p>
</div>

<div class="cart-right">

<input placeholder="Coupon Code">
<button>Apply</button>

<div class="summary">
<p>Sub Total <span>₹4,700</span></p>
<p>Taxes <span>₹199</span></p>
<p>Discount <span>₹0</span></p>
<h3>Total <span>₹4,999</span></h3>
</div>

<button class="pay-btn">Pay Now ₹4,999</button>

</div>

</section>

</body>
</html>
